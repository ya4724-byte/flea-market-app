<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body class="bg-gray-50 text-gray-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    // ===== 定数 =====
    const CATEGORIES = ['家電', '衣類', 'ホビー', '家具', '本', 'その他'];
    const CONDITIONS = ['新品未使用', '未使用に近い', '目立った傷や汚れなし', 'やや傷や汚れあり', '傷や汚れあり'];
    const SHIPPING_METHODS = ['らくらくメルカリ便', 'ゆうゆうメルカリ便', '宅急便', '未定'];
    const SHIPPING_DAYS = ['1〜2日以内', '2〜3日以内', '4〜7日以内'];

    const SHIPPING_COSTS = {
      'らくらくメルカリ便': [
        { label: 'S・60サイズ', cost: 750 },
        { label: 'M・80サイズ', cost: 850 },
        { label: 'L・100サイズ', cost: 1050 },
        { label: '2L・120サイズ', cost: 1200 },
      ],
      'ゆうゆうメルカリ便': [
        { label: '60サイズ', cost: 730 },
        { label: '80サイズ', cost: 870 },
        { label: '100サイズ', cost: 1070 },
      ],
    };

    const CONDITION_DESC = {
      '新品未使用':         '未開封・未使用の商品です。',
      '未使用に近い':       'ほとんど使用していない商品です。',
      '目立った傷や汚れなし': '全体的に状態良好です。目立った傷や汚れはございません。',
      'やや傷や汚れあり':   '使用感はありますが、大きなダメージはございません。',
      '傷や汚れあり':       '使用による傷や汚れがあります。詳細は写真にてご確認ください。',
    };

    const DISCLAIMER = `即購入OKです。
値下げ交渉・バラ売りは対応しておりません。
ペット・喫煙者なしの環境です。
商品状態はできる限り正確に記載しておりますが、見落としがある場合があります。
気になる点は購入前にご確認ください。
梱包は丁寧に行いますが、リサイクル資材を使用する場合があります。`;

    // ===== ユーティリティ =====
    function genId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function useLocalStorage(key, initial) {
      const [value, setValue] = useState(() => {
        try {
          const s = localStorage.getItem(key);
          return s ? JSON.parse(s) : initial;
        } catch { return initial; }
      });
      useEffect(() => {
        try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
      }, [key, value]);
      return [value, setValue];
    }

    // ===== 出品文生成 =====
    function generateText(data) {
      const L = [];
      const push = (...args) => L.push(...args);
      const nl = () => push('');

      // ① 商品名
      push('【商品名】');
      push(data.productName || '（商品名未入力）');
      nl();

      // ② 内容・特徴
      push('【内容・特徴】');
      let desc = '';
      if (data.brand) desc += `${data.brand}の`;
      desc += (data.productName || '商品') + 'です。';
      if (data.notes) desc += `\n${data.notes}`;
      push(desc);
      nl();

      // ③ サイズ/型番/仕様
      push('【サイズ/型番/仕様】');
      if (data.brand)       push(`・メーカー：${data.brand}`);
      if (data.modelNumber) push(`・型番：${data.modelNumber}`);
      if (data.color)       push(`・カラー：${data.color}`);
      if (data.size)        push(`・サイズ：${data.size}`);
      if (data.category === '本') push(`・書き込み：${data.hasWriting ? 'あり' : 'なし'}`);
      nl();

      // ④ 状態・欠品・注意点
      push('【状態・欠品・注意点】');
      if (data.condition && CONDITION_DESC[data.condition]) push(CONDITION_DESC[data.condition]);
      push('中古品のため使用感あり、状態は写真にてご確認ください。');
      nl();

      // ⑤ 発送・付属品
      push('【発送・付属品】');
      const accList = [];
      if (data.accessories?.box)      accList.push('箱');
      if (data.accessories?.manual)   accList.push('説明書');
      if (data.accessories?.warranty) accList.push('保証書');
      if (data.accessories?.other)    accList.push(data.accessories.otherText || 'その他付属品');
      push(accList.length > 0 ? `・付属品：${accList.join('・')}` : '・本体のみの出品です。');
      if (data.shippingMethod && data.shippingMethod !== '未定') {
        push(`・${data.shippingMethod}にて発送いたします。`);
      }
      nl();

      // ⑥ 固定フッター
      push(DISCLAIMER);

      // ⑦ 相場（オプション）
      if (data.marketPriceMin || data.marketPriceMax) {
        nl();
        push('【参考相場】');
        const min = data.marketPriceMin ? `¥${Number(data.marketPriceMin).toLocaleString()}` : '?';
        const max = data.marketPriceMax ? `¥${Number(data.marketPriceMax).toLocaleString()}` : '?';
        push(`メルカリSOLD実績：${min}〜${max}程度`);
      }

      return L.join('\n');
    }

    // ===== デフォルト値 =====
    const defaultListing = {
      productName: '',
      category: '家電',
      brand: '',
      modelNumber: '',
      color: '',
      size: '',
      accessories: { box: false, manual: false, warranty: false, other: false, otherText: '' },
      condition: '目立った傷や汚れなし',
      shippingMethod: 'らくらくメルカリ便',
      shippingOrigin: '東京都',
      shippingDays: '2〜3日以内',
      notes: '',
      marketPriceMin: '',
      marketPriceMax: '',
      hasWriting: false,
      // 利益計算フィールド
      purchase: '',
      purchaseShip: '',
      sellPrice: '',
      profitShippingMethod: 'らくらくメルカリ便',
      profitSizeLabel: '',
      profitCustomShip: '',
    };

    // ===== 共通UIパーツ =====
    function Field({ label, required, children }) {
      return (
        <div className="mb-3">
          <label className="block text-xs font-medium text-gray-600 mb-1">
            {label}{required && <span className="text-red-500 ml-0.5">*</span>}
          </label>
          {children}
        </div>
      );
    }

    const inputCls = "w-full border border-gray-300 rounded-md px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent bg-white";

    function Input(props) {
      return <input className={inputCls} {...props} />;
    }

    function Select({ children, ...props }) {
      return (
        <select className={inputCls} {...props}>{children}</select>
      );
    }

    function Textarea(props) {
      return (
        <textarea
          className={`${inputCls} resize-y`}
          rows={3}
          {...props}
        />
      );
    }

    // ===== 画像から出品文を直接生成（マルチAPI対応） =====
    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    const AI_LISTING_PROMPT = `画像に写っている商品を詳しく説明してください。
画像から読み取れる情報をもとに、自然な日本語で記述してください。
説明・コメントは不要です。以下のフォーマット厳守で出力してください。

===LISTING===
【商品名】
（ブランド＋商品種別＋特徴を含む検索されやすいタイトル）

【内容・特徴】
（ブランド紹介・デザイン・用途など2〜4文）

【サイズ/型番/仕様】
・メーカー：
・タイプ：
・素材：
・カラー：
（判明する項目のみ記載）

【状態・欠品・注意点】
（画像から読み取れる傷・汚れ・状態を具体的に記載）
中古品のため使用感あり、状態は写真にてご確認ください。

【発送・付属品】
本体のみの出品です。

即購入OKです。
値下げ交渉・バラ売りは対応しておりません。
ペット・喫煙者なしの環境です。
商品状態はできる限り正確に記載しておりますが、見落としがある場合があります。
気になる点は購入前にご確認ください。
梱包は丁寧に行いますが、リサイクル資材を使用する場合があります。
===INFO===
{"productName":"","brand":"","category":"家電/衣類/ホビー/家具/本/その他のいずれか","color":"","size":"","condition":"新品未使用/未使用に近い/目立った傷や汚れなし/やや傷や汚れあり/傷や汚れありのいずれか"}
===END===`;

    // Google Gemini 単一モデルで呼び出し
    async function callGeminiModel(model, images, apiKey) {
      const apiVer = model.startsWith('gemini-1.5') ? 'v1' : 'v1beta';
      const parts = [{ text: AI_LISTING_PROMPT }];
      for (const b64 of images) {
        parts.push({ inline_data: { mime_type: 'image/jpeg', data: b64 } });
      }
      const res = await fetch(
        `https://generativelanguage.googleapis.com/${apiVer}/models/${model}:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts }],
            generationConfig: { maxOutputTokens: 1500 },
          }),
        }
      );
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        const msg = err.error?.message ?? '';
        throw new Error(msg || `HTTPエラー ${res.status}`);
      }
      const data = await res.json();
      const content = data.candidates?.[0]?.content?.parts?.[0]?.text ?? '';
      if (!content) throw new Error('レスポンスが空でした');
      return content;
    }

    // Geminiモデルを無料枠が広いものから順に試す
    const GEMINI_MODELS = [
      'gemini-2.0-flash-lite',   // 無料: 30rpm / 1500 req/day
      'gemini-1.5-flash',        // 無料: 15rpm / 1500 req/day
      'gemini-2.0-flash',        // 無料: 地域によって制限あり
    ];

    async function generateWithGemini(images, apiKey) {
      let lastErr = '';
      for (const model of GEMINI_MODELS) {
        try {
          return await callGeminiModel(model, images, apiKey);
        } catch (err) {
          lastErr = err.message;
          if (
            err.message.includes('quota') || err.message.includes('Quota') ||
            err.message.includes('not found') || err.message.includes('429')
          ) continue;
          throw err;
        }
      }
      throw new Error('Gemini無料枠が利用不可です（日本では制限される場合があります）。設定画面でOpenAI APIキーを登録するか、Geminiに課金設定してください');
    }

    // OpenAI GPT-4o（有料）
    async function generateWithOpenAI(images, apiKey) {
      const content = [
        { type: 'text', text: AI_LISTING_PROMPT },
        ...images.map(b64 => ({
          type: 'image_url',
          image_url: { url: `data:image/jpeg;base64,${b64}`, detail: 'low' },
        })),
      ];
      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({
          model: 'gpt-4o',
          messages: [{ role: 'user', content }],
          max_tokens: 1500,
        }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `OpenAI HTTPエラー ${res.status}`);
      }
      const data = await res.json();
      return data.choices[0].message.content;
    }

    // 無料優先で登録済みAPIを順番に試す
    async function generateListingFromImages(images, settings) {
      const apis = [];
      if (settings?.geminiApiKey) apis.push({ name: 'Gemini', fn: () => generateWithGemini(images, settings.geminiApiKey) });
      if (settings?.openaiApiKey) apis.push({ name: 'OpenAI', fn: () => generateWithOpenAI(images, settings.openaiApiKey) });
      if (apis.length === 0) throw new Error('APIキーが未登録です。設定画面でGemini（無料）またはOpenAIのキーを登録してください');
      let lastError = '';
      for (const api of apis) {
        try { return await api.fn(); }
        catch (err) { lastError = `${api.name}: ${err.message}`; }
      }
      throw new Error(lastError);
    }

    // AIレスポンスから出品文とJSON情報を分離
    function parseAIResponse(raw) {
      const listingMatch = raw.match(/===LISTING===\s*([\s\S]*?)\s*===INFO===/);
      const infoMatch    = raw.match(/===INFO===\s*(\{[\s\S]*?\})\s*===END===/);
      const listingText  = listingMatch ? listingMatch[1].trim() : raw.trim();
      let info = {};
      if (infoMatch) {
        try { info = JSON.parse(infoMatch[1]); } catch {}
      }
      return { listingText, info };
    }

    // ===== AI相場調査 =====
    async function callGeminiText(prompt, apiKey) {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { maxOutputTokens: 300 },
          }),
        }
      );
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error?.message || `HTTPエラー ${res.status}`); }
      const data = await res.json();
      return data.candidates?.[0]?.content?.parts?.[0]?.text ?? '';
    }

    async function callOpenAIText(prompt, apiKey) {
      const cleanKey = (apiKey || '').trim();
      // Fetch APIはヘッダー値にISO-8859-1範囲外の文字を許可しない
      if ([...cleanKey].some(c => c.charCodeAt(0) > 0xFF)) {
        throw new Error('APIキーに無効な文字が含まれています。設定画面で再入力してください');
      }
      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${cleanKey}` },
        body: JSON.stringify({ model: 'gpt-4o-mini', messages: [{ role: 'user', content: prompt }], max_tokens: 300 }),
      });
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error?.message || `OpenAI HTTPエラー ${res.status}`); }
      const data = await res.json();
      return data.choices[0].message.content;
    }

    async function fetchMarketPriceFromAI(productName, settings) {
      const prompt = `「${productName}」をフリマアプリで中古販売する場合の一般的な価格帯を、あなたの知識に基づいて教えてください。
JSONのみ出力してください（説明不要）。

{"avgSoldPrice":数値,"maxSoldPrice":数値,"minListedPrice":数値,"note":"補足20字以内"}

- avgSoldPrice: 中古品として売れやすい価格の目安（円・整数）
- maxSoldPrice: 状態が良い場合に期待できる上限価格（円・整数）
- minListedPrice: 安値出品の下限目安（円・整数）
- note: 価格に影響する主な要因（状態・人気度など）`;

      const tryParse = raw => {
        const m = raw.match(/\{[\s\S]*?\}/);
        if (!m) throw new Error('JSONパース失敗');
        return JSON.parse(m[0]);
      };

      let lastError = '';
      if (settings?.geminiApiKey) {
        try { return tryParse(await callGeminiText(prompt, settings.geminiApiKey)); }
        catch (e) { lastError = `Gemini: ${e.message}`; }
      }
      if (settings?.openaiApiKey) {
        try { return tryParse(await callOpenAIText(prompt, settings.openaiApiKey)); }
        catch (e) { lastError = `OpenAI: ${e.message}`; }
      }
      throw new Error(lastError || 'APIキーが未登録です。設定画面でGemini（無料）またはOpenAIのキーを登録してください');
    }

    // ===== Google Sheets 連携 =====
    async function postToSheet(gasUrl, data) {
      if (!gasUrl) return;
      // GASはGETクエリパラメータ方式が最も確実
      const params = new URLSearchParams({
        savedAt:        data.savedAt || '',
        productName:    data.productName || '',
        category:       data.category || '',
        condition:      data.condition || '',
        sellPrice:      data.sellPrice || 0,
        purchase:       data.purchase || 0,
        purchaseShip:   data.purchaseShip || 0,
        calcShipCost:   data.calcShipCost || 0,
        calcFee:        data.calcFee || 0,
        calcProfit:     data.calcProfit || 0,
        calcProfitRate: data.calcProfitRate || 0,
      });
      await fetch(`${gasUrl}?${params.toString()}`);
    }

    // ===== Phase 1: 出品文ジェネレーター =====
    function ListingGenerator({ marketMemos, onSave, onSaveMarketMemo, editData, onEditClear, settings }) {
      const [form, setForm] = useState(editData || defaultListing);
      const [copied, setCopied] = useState(false);
      const [saved, setSaved] = useState(false);
      const [generating, setGenerating] = useState(false);
      const [genError, setGenError] = useState('');
      const [aiText, setAiText] = useState('');       // AI生成テキスト（設定時はプレビューに表示）
      const [selectedCount, setSelectedCount] = useState(0);
      const fileInputRef = useRef(null);
      const [marketData, setMarketData] = useState(null);
      const [fetchingMarket, setFetchingMarket] = useState(false);
      const [marketError, setMarketError] = useState('');

      async function handleImagesChange(e) {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        setSelectedCount(files.length);
        setGenerating(true);
        setGenError('');
        setAiText('');
        try {
          const images = await Promise.all(files.map(toBase64));
          const raw = await generateListingFromImages(images, settings);
          const { listingText, info } = parseAIResponse(raw);
          setAiText(listingText);
          // フォーム項目にも反映（空でない項目のみ上書き）
          setForm(f => {
            const merged = { ...f };
            ['productName','brand','category','color','size','condition'].forEach(k => {
              if (info[k]) merged[k] = info[k];
            });
            return merged;
          });
        } catch (err) {
          setGenError(err.message);
        } finally {
          setGenerating(false);
          e.target.value = '';
        }
      }

      useEffect(() => {
        if (editData) {
          setForm(editData);
          // 保存済みの出品文テキストがあれば復元
          setAiText(editData.listingText || '');
        }
      }, [editData]);

      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
      const setAcc = (k, v) => setForm(f => ({ ...f, accessories: { ...f.accessories, [k]: v } }));

      // プレビューに表示するテキスト（AI生成優先）
      const previewText = aiText || generateText(form);

      async function handleCopy() {
        try {
          await navigator.clipboard.writeText(previewText);
        } catch {
          const el = document.createElement('textarea');
          el.value = previewText;
          document.body.appendChild(el);
          el.select();
          document.execCommand('copy');
          document.body.removeChild(el);
        }
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      }

      function handleSave() {
        const listingText = aiText || generateText(form);
        // 利益計算値を計算して一緒に保存
        const hasSizes = form.profitShippingMethod in SHIPPING_COSTS;
        const shipCost = hasSizes
          ? (SHIPPING_COSTS[form.profitShippingMethod]?.find(o => o.label === form.profitSizeLabel)?.cost ?? 0)
          : (parseFloat(form.profitCustomShip) || 0);
        const sp = parseFloat(form.sellPrice) || 0;
        const fee = Math.round(sp * 0.1);
        const profit = sp - (parseFloat(form.purchase) || 0) - (parseFloat(form.purchaseShip) || 0) - shipCost - fee;
        const profitRate = sp > 0 ? (profit / sp) * 100 : 0;
        const data = {
          ...form, listingText,
          id: form.id || genId(),
          savedAt: new Date().toISOString(),
          calcShipCost: shipCost,
          calcFee: fee,
          calcProfit: profit,
          calcProfitRate: Math.round(profitRate * 10) / 10,
        };
        onSave(data);
        setSaved(true);
        setTimeout(() => setSaved(false), 2000);
      }

      function handleNew() {
        setForm(defaultListing);
        setAiText('');
        setMarketData(null);
        onEditClear();
      }

      async function handleFetchMarket() {
        if (!form.productName) return;
        setFetchingMarket(true);
        setMarketError('');
        setMarketData(null);
        try {
          const data = await fetchMarketPriceFromAI(form.productName, settings);
          setMarketData(data);
        } catch (err) {
          setMarketError(err.message);
        } finally {
          setFetchingMarket(false);
        }
      }

      function handleMarketSelect(e) {
        const id = e.target.value;
        if (!id) return;
        const m = marketMemos.find(x => x.id === id);
        if (m) {

    // ===== Phase 2: 利益計算ツール =====
    function ProfitCalculator({ settings }) {
      const [purchase, setPurchase]     = useState('');
      const [purchaseShip, setPurchaseShip] = useState('');
      const [sellPrice, setSellPrice]   = useState('');
      const [method, setMethod]         = useState('らくらくメルカリ便');
      const [sizeLabel, setSizeLabel]   = useState('');
      const [customShip, setCustomShip] = useState('');

      const hasSizes = method in SHIPPING_COSTS;
      const sizeOptions = hasSizes ? SHIPPING_COSTS[method] : [];

      const shipCost = hasSizes
        ? (sizeOptions.find(o => o.label === sizeLabel)?.cost ?? 0)
        : (parseFloat(customShip) || 0);

      const p  = parseFloat(purchase) || 0;
      const ps = parseFloat(purchaseShip) || 0;
      const sp = parseFloat(sellPrice) || 0;
      const fee = Math.round(sp * 0.1);
      const profit = sp - p - ps - shipCost - fee;
      const rate = sp > 0 ? (profit / sp) * 100 : 0;
      const threshold = settings.profitThreshold ?? 15;
      const isOK = rate >= threshold;
      const hasData = sp > 0;

      return (
        <div className="flex flex-col lg:flex-row gap-4">
          <div className="lg:w-1/2 bg-white rounded-xl border border-gray-200 shadow-sm p-4">
            <h2 className="font-bold text-gray-800 mb-3 pb-2 border-b border-gray-100">入力</h2>

            <Field label="仕入れ価格（円）">
              <Input type="number" value={purchase} onChange={e => setPurchase(e.target.value)} placeholder="0" min="0" />
            </Field>
            <Field label="仕入れ送料（円）">
              <Input type="number" value={purchaseShip} onChange={e => setPurchaseShip(e.target.value)} placeholder="0" min="0" />
            </Field>
            <Field label="出品予定価格（円）" required>
              <Input type="number" value={sellPrice} onChange={e => setSellPrice(e.target.value)} placeholder="0" min="0" />
            </Field>

            <Field label="発送方法">
              <Select value={method} onChange={e => { setMethod(e.target.value); setSizeLabel(''); }}>
                {SHIPPING_METHODS.map(m => <option key={m}>{m}</option>)}
              </Select>
            </Field>

            {hasSizes ? (
              <Field label="サイズ">
                <Select value={sizeLabel} onChange={e => setSizeLabel(e.target.value)}>
                  <option value="">選択してください</option>
                  {sizeOptions.map(o => (
                    <option key={o.label} value={o.label}>{o.label}（¥{o.cost.toLocaleString()}）</option>
                  ))}
                </Select>
              </Field>
            ) : (
              <Field label="送料（円）">

    // ===== Phase 3: 出品履歴管理 =====
    function ListingHistory({ listings, onEdit, onDuplicate, onDelete }) {
      const [nameQ, setNameQ]   = useState('');
      const [catQ, setCatQ]     = useState('');
      const [deleteTarget, setDeleteTarget] = useState(null);

      const filtered = listings
        .filter(l => {

          return ok1 && ok2;
        })
        .sort((a, b) => new Date(b.savedAt) - new Date(a.savedAt));

      function fmtDate(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
      }

      const condCls = {
        '新品未使用':           'bg-blue-100 text-blue-700',
        '未使用に近い':         'bg-green-100 text-green-700',
        '目立った傷や汚れなし': 'bg-teal-100 text-teal-700',
        'やや傷や汚れあり':     'bg-yellow-100 text-yellow-700',
        '傷や汚れあり':         'bg-red-100 text-red-600',

      return (
        <div>
          <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-3 mb-4 flex flex-wrap gap-2">

              onChange={e => setNameQ(e.target.value)}

            <select
              className={`${inputCls} w-auto`}
              value={catQ}
              onChange={e => setCatQ(e.target.value)}

          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3">
              {filtered.map(item => (
                <div key={item.id} className="bg-white rounded-xl border border-gray-200 shadow-sm p-4 hover:shadow-md transition-shadow">
                  <div className="flex items-start justify-between gap-2 mb-2">
                    <h3 className="font-medium text-sm text-gray-800 leading-snug line-clamp-2">{item.productName || '（名称なし）'}</h3>

                  <div className="flex flex-wrap gap-1.5 mb-3">

                      <span className={`text-xs px-2 py-0.5 rounded-full ${condCls[item.condition] || 'bg-gray-100 text-gray-600'}`}>
                        {item.condition}
                      </span>
                    )}
                  </div>
                  {item.brand && <div className="text-xs text-gray-400 mb-2 truncate">{item.brand}</div>}
                  {/* 利益情報 */}
                  {item.sellPrice > 0 && (
                    <div className={`mb-2 px-2 py-1.5 rounded-lg text-xs flex items-center justify-between ${
                      item.calcProfit >= 0 ? 'bg-green-50 border border-green-100' : 'bg-red-50 border border-red-100'

                      <span className={`font-bold ${item.calcProfit >= 0 ? 'text-green-600' : 'text-red-500'}`}>

                    <button onClick={() => setDeleteTarget(item)} className="flex-1 py-1.5 text-xs rounded-lg border border-red-200 text-red-500 hover:bg-red-50 transition-colors">削除</button>

                </div>
              </div>
            </div>
          )}
        </div>

                      <div className="text-xs text-gray-500 mt-0.5 flex flex-wrap gap-x-2">

                <div className="flex gap-2">
                  <button onClick={() => setDeleteTarget(null)} className="flex-1 py-2 rounded-lg border border-gray-300 text-sm text-gray-600 hover:bg-gray-50">キャンセル</button>
                  <button onClick={() => { onDelete(deleteTarget.id); setDeleteTarget(null); }} className="flex-1 py-2 rounded-lg bg-red-500 text-white text-sm hover:bg-red-600">削除する</button>

    function App() {

      const [listings, setListings]           = useLocalStorage('fm_listings', []);
      const [marketMemos, setMarketMemos]     = useLocalStorage('fm_market_memos', []);

      const [showSettings, setShowSettings]   = useState(false);
      const [toast, setToast]                 = useState('');

      function showToast(msg) {
        setToast(msg);
        setTimeout(() => setToast(''), 2500);
      }

      function handleSaveListing(data) {
        const isNew = !listings.find(l => l.id === data.id);
        setListings(prev => {
          const idx = prev.findIndex(l => l.id === data.id);
          if (idx >= 0) {
            const updated = [...prev];
            updated[idx] = data;
            return updated;
          }
          return [data, ...prev];
        });
        // 新規保存時のみシートに追記（更新は重複するため除外）
        if (isNew && settings.gasUrl) {
          postToSheet(settings.gasUrl, data)
            .then(() => showToast('保存 & シートに記録しました'))
            .catch(() => showToast('保存しました（シート記録失敗）'));
        } else {
          showToast(editData ? '更新しました' : '保存しました');
        }
      }

      function handleEdit(item) {
        setEditData(item);
        setTab('generator');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function handleDuplicate(item) {
        const dup = { ...item, id: genId(), savedAt: new Date().toISOString(), productName: item.productName + '（コピー）' };
        setListings(prev => [dup, ...prev]);
        showToast('複製しました');

      function handleDeleteListing(id) {
        setListings(prev => prev.filter(l => l.id !== id));
        showToast('削除しました');
      }

      function handleSaveMarketMemo(memo) {
        setMarketMemos(prev => [memo, ...prev]);
        showToast('相場を登録しました');
      }

      function handleDeleteMarketMemo(id) {
        setMarketMemos(prev => prev.filter(m => m.id !== id));
        showToast('削除しました');

        { id: 'market',    label: `相場メモ（${marketMemos.length}）` },

              </div>
              <div className="flex overflow-x-auto">
                {tabs.map(t => (
                  <button
                    key={t.id}
                    onClick={() => setTab(t.id)}
                    className={`px-3 sm:px-4 py-2.5 text-xs sm:text-sm font-medium border-b-2 whitespace-nowrap transition-colors ${
                      tab === t.id
                        ? 'border-red-500 text-red-600'
                        : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-200'
                    }`}
                  >
                    {t.label}
                  </button>
                ))}
              </div>
            </div>
          </header>

          {/* トースト通知 */}
          <div className={`fixed top-16 right-4 z-50 transition-all duration-300 ${toast ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-2 pointer-events-none'}`}>
            <div className="bg-gray-800 text-white text-sm px-4 py-2 rounded-lg shadow-lg">
              {toast}
            </div>
          </div>

          {/* コンテンツ */}
          <main className="max-w-7xl mx-auto px-3 sm:px-4 py-4">
            {tab === 'generator' && (
              <ListingGenerator
                marketMemos={marketMemos}
                onSave={handleSaveListing}
                onSaveMarketMemo={handleSaveMarketMemo}
                editData={editData}
                onEditClear={() => setEditData(null)}
                settings={settings}
              />
            )}
            {tab === 'history' && (
              <ListingHistory
                listings={listings}
                onEdit={handleEdit}
                onDuplicate={handleDuplicate}
                onDelete={handleDeleteListing}
              />
            )}
            {tab === 'market' && (
              <MarketMemo
                memos={marketMemos}
                onSave={handleSaveMarketMemo}
                onDelete={handleDeleteMarketMemo}
              />
            )}
          </main>

          {showSettings && (
            <SettingsModal
              settings={settings}
              onSave={setSettings}
              onClose={() => setShowSettings(false)}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <!-- Service Worker 登録 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
